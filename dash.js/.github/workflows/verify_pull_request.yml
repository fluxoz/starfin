name: verify_pull_request

on:
    pull_request:
        branches:
            - 'development'

jobs:
    merge_build_and_unit_test:
        runs-on: ubuntu-24.04
        steps:
            # actions/checkout on pull_request events checks out the merge commit (refs/pull/<PR#>/merge),
            # which is the PR branch merged into the target branch (development). This ensures the build
            # and tests verify the code as it would look after merging.
            -   name: Checkout repository
                uses: actions/checkout@v4
            -   name: Setup dash.js
                uses: ./.github/actions/setup-dashjs
            -   name: Build and run unit tests
                run: npm run build

    run_functional_test_single_stream_lambdatest:
        if: github.event.pull_request.head.repo.fork == false
        runs-on: ubuntu-24.04
        steps:
            # actions/checkout on pull_request events checks out the merge commit (refs/pull/<PR#>/merge),
            # which is the PR branch merged into the target branch (development). This ensures the
            # functional tests verify the code as it would look after merging.
            -   name: Checkout repository
                uses: actions/checkout@v4
            -   name: Setup dash.js
                uses: ./.github/actions/setup-dashjs
            -   name: Install karma-webdriver-launcher
                run: npm install karma-webdriver-launcher
            -   name: Build modern bundle
                run: npm run webpack-build-modern
            -   name: Start Tunnel
                uses: LambdaTest/LambdaTest-tunnel-action@v2
                id: tunnel
                with:
                    user: ${{ secrets.LT_USERNAME }}
                    accessKey: ${{ secrets.LT_ACCESS_KEY }}
                    tunnelName: "dashjs-tunnel-${{github.run_number}}"
            -   name: Run functional tests on LambdaTest
                env:
                    LT_USERNAME: ${{ secrets.LT_USERNAME }}
                    LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
                run: node_modules/karma/bin/karma start test/functional/config/karma.functional.conf.cjs --configfile=lambdatest --streamsfile=single
